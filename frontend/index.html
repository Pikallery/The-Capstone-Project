<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capstone Project — Village API Platform</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Apply dark class before React mounts to avoid flash -->
    <script>
      try {
        if (JSON.parse(localStorage.getItem('theme-dark')) === true)
          document.documentElement.classList.add('dark');
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
